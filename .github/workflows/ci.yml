name: ci

on:
  push:
    branches:
    - main
    - axum-dev
  pull_request:
    branches:
    - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CARGO_BUILD_JOBS: 2

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    name: build (${{ matrix.arch }})

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y moreutils protobuf-compiler

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Free disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Load Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: false

    - name: Run repo init
      run: cargo xtask repo init

    - name: Run precheckin
      run: cargo xtask precheckin --docker=excluded

  docker:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    name: docker (${{ matrix.arch }})
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y moreutils protobuf-compiler

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Free disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: false
        swap-storage: true

    - name: Load Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: false

    - name: Run repo init
      run: cargo xtask repo init

    - name: Run Docker tests
      run: cargo xtask precheckin --docker=only

    - name: Log in to Container Registry
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.arch == 'x86_64'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag and push Docker image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.arch == 'x86_64'
      run: |
        docker tag fractalbits:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker tag fractalbits:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  cleanup-images:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
    - name: Delete old container images
      uses: actions/delete-package-versions@v5
      with:
        package-name: fractalbits-main
        package-type: container
        min-versions-to-keep: 5
